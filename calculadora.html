<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Justo - Lucro Real</title>
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: sans-serif; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #00E676; 
            max-width: 550px; 
            width: 100%;
            box-shadow: 0px 4px 15px rgba(0, 230, 118, 0.2);
        }
        h2 { color: #00E676; text-align: center; margin-top: 0; margin-bottom: 5px; }
        .sub-header { text-align: center; font-size: 12px; color: #888; margin-bottom: 20px; }
        
        .toggle-group { display: flex; margin-bottom: 20px; gap: 10px; }
        .toggle-btn { 
            flex: 1; padding: 12px; border: 1px solid #333; border-radius: 8px; 
            background: #252525; color: white; cursor: pointer; font-weight: bold;
        }
        .toggle-btn.active { border-color: #00E676; background: rgba(0, 230, 118, 0.1); color: #00E676; }

        .grid-campos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 18px; }
        
        label { display: block; margin-bottom: 4px; font-size: 11px; color: #00E676; text-transform: uppercase; font-weight: bold; }
        
        input { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            background: #2A2A2A; color: white; box-sizing: border-box; font-size: 16px;
        }
        input:focus { outline: 2px solid #00E676; }

        /* Dicas e Explicações */
        .tip { font-size: 10px; color: #888; margin-top: 4px; line-height: 1.2; display: block; }
        .tip b { color: #aaa; }

        button#calc-btn { 
            background: #00E676; color: black; border: none; padding: 18px; 
            width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; 
            cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .resultado { background: #000; padding: 20px; margin-top: 25px; border-radius: 10px; text-align: center; display: none; border: 1px solid #333; }
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .valor { color: #00E676; font-size: 26px; font-weight: bold; display: block; }
        .res-label { font-size: 10px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }

        .ad-slot { background: #1a1a1a; padding: 10px; margin: 15px 0; border-radius: 8px; font-size: 10px; color: #444; text-align: center; border: 1px dashed #333; width: 100%; max-width: 550px; }
    </style>
</head>
<body>

    <div class="ad-slot">ANÚNCIO GOOGLE ADSENSE</div>

    <div class="card">
        <h2>CUSTOS OPERACIONAIS</h2>
        <p class="sub-header">Preencha os campos para saber quanto configurar no seu App Justo.</p>
        
        <div class="toggle-group">
            <button id="btn-alugado" class="toggle-btn active" onclick="setMode('alugado')">ALUGADO</button>
            <button id="btn-proprio" class="toggle-btn" onclick="setMode('proprio')">PRÓPRIO</button>
        </div>

        <div class="grid-campos">
            <div class="form-group">
                <label>KM Rodado/Dia</label
