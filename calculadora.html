<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Lucro Real - Justo</title>
    <style>
        :root { 
            --neon-green: #00FF00; 
            --bg-dark: #121212; 
            --card-bg: #1E1E1E; 
            --input-bg: #2A2A2A;
            --text-gray: #999999;
        }
        
        body { 
            background-color: var(--bg-dark); 
            color: #FFFFFF; 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            padding: 15px; 
        }

        .container { max-width: 450px; margin: auto; }

        /* Estilo do Card Android */
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #333;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        h1 { color: var(--neon-green); text-align: center; font-size: 20px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* Botões de Perfil (Estilo Toggle) */
        .toggle-group { display: flex; background: #000; border-radius: 8px; padding: 4px; margin-bottom: 25px; }
        .toggle-btn { 
            flex: 1; padding: 12px; border: none; border-radius: 6px; 
            background: none; color: var(--text-gray); cursor: pointer; 
            font-weight: bold; transition: 0.3s; 
        }
        .toggle-btn.active { background: var(--neon-green); color: #000; }

        /* Grid de Campos das Imagens */
        .grid-campos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 11px; color: var(--text-gray); margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        
        .input-box { position: relative; display: flex; align-items: center; }
        .unit { position: absolute; right: 10px; color: var(--neon-green); font-size: 12px; font-weight: bold; }
        .prefix { position: absolute; left: 10px; color: var(--neon-green); font-size: 12px; font-weight: bold; }

        input { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; 
            background: var(--input-bg); color: #fff; font-size: 16px; outline: none; 
            box-sizing: border-box;
        }
        input:focus { border-color: var(--neon-green); }
        input.has-prefix { padding-left: 35px; }

        /* Botão de Calcular Estilo "Botão Principal" */
        button#calc-btn { 
            background: var(--neon-green); color: #000; border: none; 
            padding: 18px; width: 100%; border-radius: 10px; 
            font-weight: bold; font-size: 16px; cursor: pointer; 
            margin-top: 15px; text-transform: uppercase;
        }

        /* Resultado Estilo Selo de Lucro */
        .result-box { 
            background: #000; border: 1px solid var(--neon-green); 
            border-radius: 10px; padding: 20px; margin-top: 25px; 
            display: none; text-align: center;
        }
        .res-title { font-size: 12px; color: var(--text-gray); margin-bottom: 10px; }
        .res-grid { display: flex; justify-content: space-around; }
        .res-val { color: var(--neon-green); font-size: 22px; font-weight: bold; display: block; }
        .res-label { font-size: 10px; color: #fff; }

        .ad-slot { background: #1a1a1a; text-align: center; padding: 10px; margin: 15px 0; border-radius: 8px; color: #444; font-size: 10px; border: 1px dashed #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="ad-slot">ESPAÇO PARA ADSENSE</div>

    <div class="card">
        <h1>Custos Operacionais</h1>
        
        <div class="toggle-group">
            <button id="btn-alugado" class="toggle-btn active" onclick="setMode('alugado')">ALUGADO</button>
            <button id="btn-proprio" class="toggle-btn" onclick="setMode('proprio')">PRÓPRIO</button>
        </div>

        <div class="grid-campos">
            <div class="form-group">
                <label>⏲️ KM Rodado/Dia</label>
                <div class="input-box">
                    <input type="number" id="km-dia" value="200">
                    <span class="unit">km</span>
                </div>
            </div>
            <div class="form-group">
                <label>⌛ Horas/Dia</label>
                <div class="input-box">
                    <input type="number" id="horas-dia" value="12">
                    <span class="unit">h</span>
                </div>
            </div>
            <div class="form-group">
                <label>⛽ Preço Litro</label>
                <div class="input-box">
                    <span class="prefix">R$</span>
                    <input type="number" id="p-comb" class="has-prefix" value="5.79" step="0.01">
                </div>
            </div>
            <div class="form-group">
                <label>🚗 Consumo</label>
                <div class="input-box">
                    <input type="number" id="consumo" value="10">
                    <span class="unit">km/L</span>
                </div>
            </div>
        </div>

            <div class="grid-campos">
                <div class="form-group">
                    <label>📋 Aluguel Semanal</label>
                    <div class="input-box">

                        <input type="number" id="aluguel-v" class="has-prefix" value
